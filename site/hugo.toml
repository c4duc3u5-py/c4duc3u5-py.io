baseURL = "https://c4duc3u5-py.github.io/c4duc3u5-py.io/"
languageCode = "en-gb"
defaultContentLanguage = "en"
title = "Deals & Finds"
theme = "ananke"
enableRobotsTXT = true
canonifyURLs = false

# SEO: Enable all content types in RSS feed for maximum exposure
rssLimit = 100
summaryLength = 50

[params]
  description = "Curated finds, buyer guides, and deals on collectibles, tech, games, beauty, home & more. UK-based deals and honest reviews."
  author = "Deals & Finds"
  favicon = "/favicon.svg"
  site_logo = ""
  show_reading_time = true
  body_classes = "avenir bg-near-white"
  background_color_class = "bg-black"
  text_color = "mid-gray"
  custom_css = ["custom.css"]
  mainSections = ["posts"]
  og_image = "/images/og-default.png"
  # SEO: Extra params
  images = ["/images/og-default.png"]
  locale = "en_GB"
  twitter_cards = true
  og_type = "website"

[params.social]
  # Add social links here if you want later

[params.ananke]
  show_recent_posts = true

[taxonomies]
  tag = "tags"
  category = "categories"
  keyword = "keywords"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow raw HTML (for eBay images etc.)
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"

[sitemap]
  changefreq = "daily"
  priority = 0.8
  filename = "sitemap.xml"

# SEO-friendly URL structure
[permalinks]
  posts = "/:slug/"
  tags = "/tags/:slug/"
  categories = "/categories/:slug/"

# Menu items
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "Categories"
  url = "/categories/"
  weight = 3

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 4

# Related content (for "You Might Also Like" sections)
[related]
  includeNewer = true
  threshold = 60
  toLower = true
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "tags"
    weight = 60
  [[related.indices]]
    name = "keywords"
    weight = 40
  [[related.indices]]
    name = "date"
    weight = 10
    pattern = "2006"
